name: E2E (live sites)

# Live-site tests authenticate against real external services and require
# credentials.  Run on main-branch pushes, manual dispatch, and on a weekly
# schedule to catch upstream auth/flow breakage early.

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      site:
        description: "Which site(s) to test"
        type: choice
        options: [all, garmin, rouvy]
        default: all
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  checks: write

jobs:
  e2e:
    name: E2E
    runs-on: ubuntu-latest
    environment: e2e
    env:
      GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
      GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
      ROUVY_EMAIL: ${{ secrets.ROUVY_EMAIL }}
      ROUVY_PASSWORD: ${{ secrets.ROUVY_PASSWORD }}
      WEB_AUTH_BRIDGE_E2E_HEADLESS: "true"
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
      - run: uv sync --all-extras
      - run: uv run playwright install --with-deps chromium

      - name: Resolve marker expression
        id: marker
        run: |
          case "${{ inputs.site || 'all' }}" in
            garmin) echo "expr=e2e and garmin" >> "$GITHUB_OUTPUT" ;;
            rouvy)  echo "expr=e2e and rouvy"  >> "$GITHUB_OUTPUT" ;;
            *)      echo "expr=e2e"            >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Run e2e tests
        run: uv run pytest -m "${{ steps.marker.outputs.expr }}" -v --junitxml=junit-e2e.xml

      - name: Publish test report
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: junit-e2e.xml
          check_name: E2E tests
          include_passed: true
          detailed_summary: true
          require_tests: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-results
          path: junit-e2e.xml
          if-no-files-found: ignore

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-traces
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
